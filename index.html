<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Scan WebSocket Tester</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      body {
        font-family: monospace;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        background: #1a1a1a;
        color: #e0e0e0;
      }
      h2 {
        color: #64b5f6;
      }
      label {
        display: block;
        margin-top: 12px;
        color: #90a4ae;
        font-size: 13px;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        background: #2a2a2a;
        border: 1px solid #444;
        color: #e0e0e0;
        padding: 8px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 13px;
      }
      textarea {
        height: 60px;
        resize: vertical;
      }
      button {
        margin-top: 12px;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
      }
      #connectBtn {
        background: #1565c0;
        color: #fff;
      }
      #connectBtn:disabled {
        background: #444;
        cursor: not-allowed;
      }
      #uploadBtn {
        background: #2e7d32;
        color: #fff;
      }
      #uploadBtn:disabled {
        background: #444;
        cursor: not-allowed;
      }
      #status {
        margin-top: 20px;
        padding: 12px;
        background: #2a2a2a;
        border-radius: 6px;
      }
      .ws-status {
        font-size: 13px;
        padding: 4px 8px;
        border-radius: 3px;
        display: inline-block;
      }
      .ws-connected {
        background: #1b5e20;
        color: #a5d6a7;
      }
      .ws-disconnected {
        background: #b71c1c;
        color: #ef9a9a;
      }
      .progress-bar-wrap {
        background: #333;
        border-radius: 6px;
        height: 24px;
        margin-top: 10px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #1565c0, #42a5f5);
        border-radius: 6px;
        transition: width 0.4s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        color: #fff;
        font-weight: bold;
      }
      #log {
        margin-top: 20px;
        background: #111;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 12px;
        height: 300px;
        overflow-y: auto;
        font-size: 12px;
      }
      .log-info {
        color: #64b5f6;
      }
      .log-ok {
        color: #81c784;
      }
      .log-error {
        color: #ef5350;
      }
      .log-event {
        color: #ffd54f;
      }
      .log-time {
        color: #555;
      }
    </style>
  </head>
  <body>
    <h2>🍽️ Scan WebSocket Tester</h2>
    <p style="color: #777; font-size: 13px">
      1. Bağlan → 2. Resim seç → 3. Upload yap → Progress'i izle
    </p>

    <label>API Base URL</label>
    <input id="baseUrl" value="http://localhost:3000/api/v1" />

    <label>JWT Token (Bearer olmadan)</label>
    <textarea
      id="token"
      placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    ></textarea>

    <button id="connectBtn" onclick="connect()">🔌 WebSocket'e Bağlan</button>

    <div id="status">
      <span class="ws-status ws-disconnected" id="wsLabel">● Bağlı değil</span>
    </div>

    <hr style="border-color: #333; margin: 20px 0" />

    <label>Resim Dosyası (JPEG/PNG/WebP, max 10MB)</label>
    <input
      type="file"
      id="imageFile"
      accept="image/jpeg,image/png,image/webp"
    />

    <button id="uploadBtn" onclick="upload()" disabled>
      📤 Upload → Analiz Et
    </button>

    <div class="progress-bar-wrap" style="margin-top: 16px">
      <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
    </div>
    <div
      id="stateLabel"
      style="
        text-align: center;
        margin-top: 6px;
        font-size: 13px;
        color: #90a4ae;
      "
    >
      -
    </div>

    <div id="log"></div>

    <script>
      let socket = null;
      let currentScanId = null;

      function log(msg, cls = "log-info") {
        const el = document.getElementById("log");
        const time = new Date().toLocaleTimeString();
        el.innerHTML += `<div><span class="log-time">[${time}]</span> <span class="${cls}">${msg}</span></div>`;
        el.scrollTop = el.scrollHeight;
      }

      function setProgress(pct, state) {
        const bar = document.getElementById("progressBar");
        bar.style.width = pct + "%";
        bar.textContent = pct + "%";
        document.getElementById("stateLabel").textContent = state;
      }

      function connect() {
        const baseUrl = document
          .getElementById("baseUrl")
          .value.replace("/api/v1", "");
        const token = document.getElementById("token").value.trim();

        if (!token) {
          alert("JWT token giriniz");
          return;
        }

        if (socket) {
          socket.disconnect();
        }

        log(`Bağlanıyor: ${baseUrl}/scan ...`, "log-info");

        socket = io(`${baseUrl}/scan`, {
          transports: ["websocket", "polling"],
          auth: { token },
        });

        socket.on("connect", () => {
          document.getElementById("wsLabel").textContent =
            "● Bağlı: " + socket.id;
          document.getElementById("wsLabel").className =
            "ws-status ws-connected";
          document.getElementById("connectBtn").disabled = true;
          document.getElementById("uploadBtn").disabled = false;
          log(
            "✅ WebSocket bağlantısı kuruldu — socket.id: " + socket.id,
            "log-ok",
          );
        });

        socket.on("disconnect", (reason) => {
          document.getElementById("wsLabel").textContent = "● Bağlı değil";
          document.getElementById("wsLabel").className =
            "ws-status ws-disconnected";
          document.getElementById("connectBtn").disabled = false;
          document.getElementById("uploadBtn").disabled = true;
          log("❌ Bağlantı kesildi: " + reason, "log-error");
        });

        socket.on("connect_error", (err) => {
          log("❌ Bağlantı hatası: " + err.message, "log-error");
        });

        // Progress event
        socket.on("scan:progress", (data) => {
          log(
            `📊 scan:progress → state=${data.state} progress=${data.progress}% — "${data.message}"`,
            "log-event",
          );
          setProgress(data.progress, `${data.state} — ${data.message}`);
        });

        // Completed event
        socket.on("scan:completed", (data) => {
          log(`🎉 scan:completed → ${JSON.stringify(data.result)}`, "log-ok");
          setProgress(100, `✅ Tamamlandı — ${data.result?.foodName ?? ""}`);
        });

        // Error event
        socket.on("scan:error", (data) => {
          log(
            `💥 scan:error → code=${data.code} message="${data.message}"`,
            "log-error",
          );
          setProgress(0, `❌ Hata: ${data.message}`);
        });
      }

      async function upload() {
        const baseUrl = document.getElementById("baseUrl").value;
        const token = document.getElementById("token").value.trim();
        const fileInput = document.getElementById("imageFile");

        if (!fileInput.files.length) {
          alert("Bir resim dosyası seçin");
          return;
        }
        if (!socket || !socket.connected) {
          alert("Önce WebSocket bağlantısı kurmalısınız");
          return;
        }

        setProgress(0, "Yükleniyor...");
        document.getElementById("uploadBtn").disabled = true;

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        log(`📤 POST ${baseUrl}/scan/upload ...`, "log-info");

        try {
          const res = await fetch(`${baseUrl}/scan/upload`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
            body: formData,
          });

          const json = await res.json();

          if (!res.ok) {
            log(`❌ Upload hatası: ${JSON.stringify(json)}`, "log-error");
            document.getElementById("uploadBtn").disabled = false;
            return;
          }

          const scanId = json.data?.scanId ?? json.scanId;
          currentScanId = scanId;
          log(`✅ Upload başarılı → scanId: ${scanId}`, "log-ok");
          log(`📡 WebSocket event bekleniyor: scan:${scanId}`, "log-info");

          // Subscribe to this specific scan
          socket.emit("subscribe:scan", { scanId });
        } catch (err) {
          log(`❌ Fetch hatası: ${err.message}`, "log-error");
        } finally {
          document.getElementById("uploadBtn").disabled = false;
        }
      }
    </script>
  </body>
</html>
